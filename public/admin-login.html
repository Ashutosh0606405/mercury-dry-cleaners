<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staff Login | Mercury Dry Cleaners</title>
  <link rel="stylesheet" href="css/main.css">
</head>
<body style="min-height: 100vh; display: flex; flex-direction: column; justify-content: space-between;">
  <div class="glow-bg"></div>
  <div class="glow-bg-right"></div>

  <!-- Header -->
  <header>
    <div class="navbar">
      <a href="index.html" class="logo">
        <div class="logo-icon">M</div>
        Mercury <span>Dry Cleaners</span>
      </a>
      <a href="index.html" class="btn-secondary">Back to Site</a>
    </div>
  </header>

  <!-- Login Card Section -->
  <main style="max-width: 450px; width: 100%; margin: 4rem auto; padding: 0 1.5rem;">
    <div class="glass-panel" style="border-radius: 24px;">
      <div style="text-align: center; margin-bottom: 2rem;">
        <div style="width: 54px; height: 54px; border-radius: 12px; background: var(--primary-glow); color: var(--primary); font-size: 1.5rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; border: 1px solid rgba(6, 182, 212, 0.2);">🔒</div>
        <h2 style="font-family: var(--font-heading); font-size: 1.75rem; margin-bottom: 0.25rem;">Staff Access Portal</h2>
        <p style="color: var(--text-muted); font-size: 0.85rem;">Enter credentials to manage pickup schedules and garment orders</p>
      </div>

      <div id="login-error-container" style="display: none; background: var(--error-glow); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--error); padding: 0.75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.85rem; display: flex; align-items: center; gap: 0.5rem;">
        <span>⚠️</span> <span id="login-error-text">Invalid username or password.</span>
      </div>

      <form id="admin-login-form" novalidate>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="e.g. admin" required autocomplete="username">
          <span class="form-error">❌ Username is required.</span>
        </div>

        <div class="form-group" style="margin-bottom: 2rem;">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
          <span class="form-error">❌ Password is required.</span>
        </div>

        <button type="submit" id="login-btn" class="btn-primary" style="width: 100%; justify-content: center; padding: 0.9rem; border-radius: 10px; font-size: 1rem;">
          Authenticate Access
        </button>
      </form>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Mercury Dry Cleaners. Security logged session.</p>
  </footer>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('admin-login-form');
      const errorContainer = document.getElementById('login-error-container');
      const errorText = document.getElementById('login-error-text');
      const submitBtn = document.getElementById('login-btn');
      
      // Hide error container on start
      errorContainer.style.display = 'none';

      // Redirect if already logged in
      fetch('/api/auth/status')
        .then(res => res.json())
        .then(data => {
          if (data.authenticated) {
            window.location.href = 'admin.html';
          }
        });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        errorContainer.style.display = 'none';
        
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        
        let isValid = true;
        
        if (!usernameInput.value.trim()) {
          usernameInput.setAttribute('aria-invalid', 'true');
          usernameInput.classList.add('user-invalid-fallback');
          isValid = false;
        } else {
          usernameInput.removeAttribute('aria-invalid');
          usernameInput.classList.remove('user-invalid-fallback');
        }
        
        if (!passwordInput.value.trim()) {
          passwordInput.setAttribute('aria-invalid', 'true');
          passwordInput.classList.add('user-invalid-fallback');
          isValid = false;
        } else {
          passwordInput.removeAttribute('aria-invalid');
          passwordInput.classList.remove('user-invalid-fallback');
        }
        
        if (!isValid) return;
        
        submitBtn.disabled = true;
        submitBtn.textContent = 'Authenticating...';
        
        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              username: usernameInput.value,
              password: passwordInput.value
            })
          });
          
          const data = await res.json();
          
          if (!res.ok) {
            throw new Error(data.error || 'Login failed.');
          }
          
          // Redirect to admin panel
          window.location.href = 'admin.html';
          
        } catch (err) {
          console.error(err);
          errorText.textContent = err.message;
          errorContainer.style.display = 'flex';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Authenticate Access';
        }
      });
    });
  </script>
</body>
</html>
